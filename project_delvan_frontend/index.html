<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Marco | Admin System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans" onload="initApp()">

    <nav class="bg-indigo-700 text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-bold">Project Marco</h1>
                <div class="flex gap-2">
                    <button onclick="switchView('sales')" class="bg-indigo-800 hover:bg-indigo-600 px-4 py-2 rounded text-sm font-semibold transition">🛒 Sales Desk</button>
                    <button onclick="switchView('owner')" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded text-sm font-semibold shadow transition">👑 Owner Portal</button>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <label class="text-sm font-medium">Exchange Rate:</label>
                <input type="number" id="exchangeRate" value="2200" onchange="updateCartMath()"
                    class="w-24 px-2 py-1 text-black rounded outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
        </div>
    </nav>

    <div id="salesView" class="max-w-7xl mx-auto mt-8 px-4 flex gap-6 items-start">
        <div class="w-2/3">
            
            <div id="rejectedSection" class="mb-8 hidden">
                <h2 class="text-xl font-bold text-red-600 mb-4">⚠️ Needs Revision</h2>
                <div id="rejectedGrid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <h2 class="text-xl font-bold text-gray-800 mb-4">Product Catalog</h2>
            <div id="catalogGrid" class="grid grid-cols-2 gap-4">
                <p id="loadingText" class="text-gray-500">⏳ Loading catalog...</p>
            </div>
        </div>

        <div class="w-1/3 bg-white p-6 rounded-xl shadow-lg sticky top-8">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-gray-800">Draft Invoice</h2>
                <span id="editModeBadge" class="hidden bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded">EDIT MODE</span>
            </div>
            
            <ul id="cartItems" class="space-y-3 mb-6 min-h-[100px]"></ul>
            
            <div class="border-t pt-4 space-y-2 text-sm text-gray-600">
                <div class="flex justify-between"><span>Subtotal:</span><span id="uiSubtotal" class="font-medium text-gray-800">0 IDR</span></div>
                <div class="flex justify-between text-indigo-600"><span>Service Fee (10%):</span><span id="uiFee" class="font-medium">0 IDR</span></div>
                <div class="flex justify-between text-lg font-bold text-gray-900 mt-2 border-t pt-2"><span>Total IDR:</span><span id="uiTotal">0 IDR</span></div>
            </div>
            
            <button onclick="submitInvoice()" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition">📤 Submit to Owner</button>
            <button onclick="clearCart()" class="w-full mt-2 text-gray-500 text-sm hover:text-gray-800 transition">🗑️ Clear Cart</button>
        </div>
    </div>

    <div id="ownerView" class="max-w-7xl mx-auto mt-8 px-4 hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Pending Approvals</h2>
            <button onclick="loadPendingInvoices()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded">🔄 Refresh</button>
        </div>
        
        <div id="approvalsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p id="approvalsLoading" class="text-gray-500">⏳ Loading pending invoices...</p>
        </div>
    </div>

    <script>
        let cart = [];
        let editingInvoiceId = null; // Tracks if we are editing an existing invoice

        function initApp() {
            fetchCatalog();
            loadRejectedInvoices(); // Check for revisions right away!
        }

        function switchView(viewName) {
            if (viewName === 'sales') {
                document.getElementById('salesView').classList.remove('hidden');
                document.getElementById('ownerView').classList.add('hidden');
                loadRejectedInvoices();
            } else {
                document.getElementById('salesView').classList.add('hidden');
                document.getElementById('ownerView').classList.remove('hidden');
                loadPendingInvoices();
            }
        }

        // --- View 1: Sales Logic ---
        async function fetchCatalog() {
            try {
                const res = await fetch('http://127.0.0.1:8000/products');
                const result = await res.json();
                const grid = document.getElementById('catalogGrid');
                document.getElementById('loadingText').style.display = 'none';
                grid.innerHTML = '';
                result.data.forEach(p => {
                    grid.innerHTML += `
                        <div class="bg-white p-4 rounded-lg shadow border hover:shadow-md transition">
                            <h3 class="font-bold text-gray-800">${p.product_name}</h3>
                            <p class="text-gray-500 mb-3">¥${p.price_cny} CNY</p>
                            <button onclick="addToCart(${p.id}, '${p.product_name}', ${p.price_cny})" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded text-sm font-semibold w-full">+ Add to Invoice</button>
                        </div>`;
                });
            } catch (e) { document.getElementById('loadingText').innerText = "❌ Failed to load catalog."; }
        }

        function addToCart(id, name, price_cny) {
            const qtyStr = prompt(`How many [${name}]?`, "1");
            if (!qtyStr) return;
            const qty = parseInt(qtyStr);
            if (qty > 0) { 
                // Check if item already exists in cart, update qty if it does
                const existingItem = cart.find(i => i.id === id);
                if (existingItem) existingItem.qty += qty;
                else cart.push({ id, name, price_cny, qty }); 
                updateCartMath(); 
            }
        }

        function removeFromCart(id) {
            // This filters out the specific item they clicked "X" on
            cart = cart.filter(item => item.id !== id);
            updateCartMath(); // Instantly recalculate the math!
        }

        function updateCartMath() {
            const list = document.getElementById('cartItems');
            const rate = parseFloat(document.getElementById('exchangeRate').value) || 0;
            list.innerHTML = ''; let subtotalIdr = 0;
            if (cart.length === 0) {
                list.innerHTML = '<li class="text-sm text-gray-400 italic">Invoice empty.</li>';
                document.getElementById('uiSubtotal').innerText = '0 IDR'; document.getElementById('uiFee').innerText = '0 IDR'; document.getElementById('uiTotal').innerText = '0 IDR'; return;
            }
            cart.forEach(item => {
                const totalIdr = item.price_cny * item.qty * rate;
                subtotalIdr += totalIdr;
                
                // We added a little red 'X' button on the right side!
                list.innerHTML += `
                    <li class="flex justify-between items-center text-sm border-b pb-1">
                        <div>
                            <span class="font-semibold text-gray-800">${item.name}</span>
                            <span class="text-gray-500 text-xs ml-1">(x${item.qty})</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-gray-700 font-medium">${totalIdr.toLocaleString()} IDR</span>
                            <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 font-bold text-lg" title="Remove Item">✕</button>
                        </div>
                    </li>`;
            });
            document.getElementById('uiSubtotal').innerText = `${subtotalIdr.toLocaleString()} IDR`;
            document.getElementById('uiFee').innerText = `${(subtotalIdr * 0.1).toLocaleString()} IDR`;
            document.getElementById('uiTotal').innerText = `${(subtotalIdr * 1.1).toLocaleString()} IDR`;
        }

        function clearCart() {
            cart = [];
            editingInvoiceId = null;
            document.getElementById('editModeBadge').classList.add('hidden');
            updateCartMath();
        }

        async function submitInvoice() {
            if (cart.length === 0) return alert("Cart is empty!");
            const rate = parseFloat(document.getElementById('exchangeRate').value) || 0;
            let subtotalIdr = 0; cart.forEach(i => subtotalIdr += (i.price_cny * i.qty * rate));
            const payload = { exchange_rate_used: rate, items: cart, subtotal_idr: subtotalIdr, service_fee_idr: subtotalIdr*0.1, final_total_idr: subtotalIdr*1.1 };
            
            try {
                // Determine if we are creating new OR updating a rejected one
                const url = editingInvoiceId ? `http://127.0.0.1:8000/update-invoice/${editingInvoiceId}` : 'http://127.0.0.1:8000/submit-invoice';
                const method = editingInvoiceId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if (result.error) alert("❌ Error: " + result.error);
                else { 
                    alert("✅ " + result.message); 
                    clearCart(); 
                    loadRejectedInvoices(); // Refresh the queue
                }
            } catch (e) { alert("❌ Failed to send."); }
        }

        // --- NEW: Handle Rejected Invoices ---
        async function loadRejectedInvoices() {
            const section = document.getElementById('rejectedSection');
            const grid = document.getElementById('rejectedGrid');
            try {
                const res = await fetch('http://127.0.0.1:8000/rejected-invoices');
                const result = await res.json();
                
                if (result.data.length === 0) {
                    section.classList.add('hidden');
                    return;
                }

                section.classList.remove('hidden');
                grid.innerHTML = '';
                
                result.data.forEach(inv => {
                    // Stringify the JSON safely to pass to the edit function
                    const invoiceDataStr = encodeURIComponent(JSON.stringify(inv.invoice_data));
                    grid.innerHTML += `
                        <div class="bg-red-50 p-4 rounded-lg shadow border border-red-200">
                            <h3 class="font-bold text-red-800">Invoice #${inv.id} Rejected</h3>
                            <p class="text-xs text-red-600 mb-2">Owner requested revision.</p>
                            <button onclick="editRejectedInvoice(${inv.id}, '${invoiceDataStr}')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm font-semibold w-full">✏️ Fix & Resubmit</button>
                        </div>`;
                });
            } catch (e) { console.error("Failed to load rejected invoices."); }
        }

        function editRejectedInvoice(id, encodedData) {
            const data = JSON.parse(decodeURIComponent(encodedData));
            cart = data.items; // Load items straight back into the cart!
            document.getElementById('exchangeRate').value = data.exchange_rate_used;
            editingInvoiceId = id;
            document.getElementById('editModeBadge').classList.remove('hidden');
            updateCartMath();
            window.scrollTo(0, 0); // Scroll to top to see cart
        }

        // --- View 2: Owner Logic ---
        async function loadPendingInvoices() {
            const grid = document.getElementById('approvalsGrid');
            grid.innerHTML = '<p class="text-gray-500">⏳ Loading...</p>';
            try {
                const res = await fetch('http://127.0.0.1:8000/pending-invoices');
                const result = await res.json();
                grid.innerHTML = '';
                
                if (result.data.length === 0) {
                    grid.innerHTML = '<p class="text-green-600 font-bold">🎉 All caught up! No pending invoices.</p>';
                    return;
                }

                result.data.forEach(inv => {
                    const data = inv.invoice_data; 
                    let itemListHtml = '';
                    data.items.forEach(item => { itemListHtml += `<li class="text-xs text-gray-600">• ${item.qty}x ${item.name}</li>`; });

                    grid.innerHTML += `
                        <div class="bg-white p-6 rounded-xl shadow border border-yellow-200 relative">
                            <span class="absolute top-4 right-4 bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded">Pending</span>
                            <h3 class="font-bold text-gray-800 mb-1">Invoice #${inv.id}</h3>
                            <p class="text-xs text-gray-500 mb-4">Rate Used: ${data.exchange_rate_used}</p>
                            
                            <div class="bg-gray-50 p-3 rounded mb-4">
                                <ul class="mb-2 border-b pb-2">${itemListHtml}</ul>
                                <div class="flex justify-between font-bold text-gray-800">
                                    <span>Total:</span>
                                    <span>${data.final_total_idr.toLocaleString()} IDR</span>
                                </div>
                            </div>
                            
                            <div class="flex gap-2">
                                <button onclick="approveInvoice(${inv.id})" class="w-2/3 bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded shadow transition">✅ Approve</button>
                                <button onclick="rejectInvoice(${inv.id})" class="w-1/3 bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 rounded transition">❌ Reject</button>
                            </div>
                        </div>`;
                });
            } catch (e) { grid.innerHTML = "❌ Failed to load."; }
        }

        async function approveInvoice(id) {
            if (!confirm(`Are you sure you want to approve Invoice #${id}?`)) return;
            try {
                const res = await fetch(`http://127.0.0.1:8000/approve-invoice/${id}`, {
                    method: 'PATCH', headers: { 'X-User-Role': 'owner' }
                });
                if (res.ok) { alert("✅ Invoice Approved!"); loadPendingInvoices(); } 
                else { const errorData = await res.json(); alert("❌ " + errorData.detail); }
            } catch (e) { alert("❌ Failed to contact server."); }
        }

        async function rejectInvoice(id) {
            if (!confirm(`Are you sure you want to REJECT Invoice #${id}? It will be sent back to Sales.`)) return;
            try {
                const res = await fetch(`http://127.0.0.1:8000/reject-invoice/${id}`, {
                    method: 'PATCH', headers: { 'X-User-Role': 'owner' } // Bouncer security!
                });
                if (res.ok) { alert("⚠️ Invoice Rejected."); loadPendingInvoices(); } 
                else { const errorData = await res.json(); alert("❌ " + errorData.detail); }
            } catch (e) { alert("❌ Failed to contact server."); }
        }
    </script>
</body>
</html>
