<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Marco | Agent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Project Marco</h1>
        <p class="text-gray-500 mb-6">Generate a customer invoice from a product link.</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Product URL (Taobao/1688)</label>
                <input type="text" id="urlInput" placeholder="https://..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            
            <button id="generateBtn" onclick="generateInvoice()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Generate Invoice Pipeline 🚀
            </button>
        </div>

        <div id="loading" class="hidden mt-6 text-center text-gray-500">
            <p>⚙️ Scraping page and calculating math...</p>
        </div>

        <div id="resultBox" class="hidden mt-6 p-4 bg-green-50 rounded-lg border border-green-200">
            <h3 class="text-green-800 font-bold mb-2">✅ Invoice Generated!</h3>
            <ul class="text-sm text-gray-700 space-y-1 mb-4">
                <li><strong>Base Price:</strong> <span id="resBase"></span> IDR</li>
                <li><strong>Service Fee (10%):</strong> <span id="resFee"></span> IDR</li>
                <li class="text-lg font-bold mt-2"><strong>Total:</strong> <span id="resTotal"></span> IDR</li>
            </ul>
            
            <a id="whatsappLink" href="#" target="_blank" 
                class="block text-center bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                💬 Message Customer on WhatsApp
            </a>
        </div>
    </div>

    <script>
        async function generateInvoice() {
            const targetUrl = document.getElementById('urlInput').value;
            if (!targetUrl) return alert("Please enter a URL!");

            // Hide previous results, show loading
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                // Call your Python FastAPI Server!
                const response = await fetch(`https://project-indo-backend.onrender.com/generate-invoice?target_url=${encodeURIComponent(targetUrl)}`);
                const data = await response.json();

                if (data.error) {
                    alert("Error: " + data.error);
                } else {
                    // Populate the results box with the data from Python
                    document.getElementById('resBase').innerText = data.financials.base_idr.toLocaleString();
                    document.getElementById('resFee').innerText = data.financials.fee_idr.toLocaleString();
                    document.getElementById('resTotal').innerText = data.financials.final_idr.toLocaleString();
                    document.getElementById('whatsappLink').href = data.whatsapp_link;
                    
                    // Show the results box
                    document.getElementById('resultBox').classList.remove('hidden');
                }
            } catch (error) {
                alert("Could not connect to the server. Is FastAPI running?");
            } finally {
                // Hide loading spinner
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
